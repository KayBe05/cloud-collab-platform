version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: cloudx-postgres
    environment:

      POSTGRES_DB: ${POSTGRES_DB:-cloudx}
      POSTGRES_USER: ${POSTGRES_USER:-cloudx_user}
      POSTGRES_PASSWORD: cloudx_9648
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudx_user} -d ${POSTGRES_DB:-cloudx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudx-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Flask Application (The Orchestrator)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudx-app
    environment:
      FLASK_APP: app.py
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      MONITOR_POLL_INTERVAL: ${MONITOR_POLL_INTERVAL:-15}
      TERMINAL_BUFFER_BYTES: ${TERMINAL_BUFFER_BYTES:-4096}
      TERMINAL_FLUSH_INTERVAL: ${TERMINAL_FLUSH_INTERVAL:-0.05}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cloudx}
      POSTGRES_USER: ${POSTGRES_USER:-cloudx_user}
      POSTGRES_PASSWORD: cloudx_9648
    ports:
      - "5001:5000"
    volumes:
      - ./app/app.py:/app/app.py:ro
      - ./app/templates:/app/templates:ro
      - ./app/monitor.py:/app/monitor.py:ro
      - ./app/static:/app/static:ro
      - app_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cloudx-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: cloudx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudx-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  cloudx-network:
    driver: bridge